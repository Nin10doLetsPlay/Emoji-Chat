<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Emoji Chat</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="app">
      <h1>Emoji Chat</h1>

      <section id="welcomeScreen" class="screen">
        <p class="subtitle">Talk with Strangers with AI Generated Emojis</p>

        <div class="button-column">
          <button id="findStrangerBtn">Find Stranger</button>
        </div>
      </section>

      <section id="searchingScreen" class="screen hidden">
        <div class="searching-box">
          <div class="searching-text">Searching for stranger...</div>
        </div>
      </section>

      <section id="chatScreen" class="screen hidden">
        <div class="top-bar">
          <div class="chat-top-actions">
            <button id="nextStrangerBtn">Next Stranger</button>
            <button id="leaveChatBtn">Leave Chat</button>
          </div>
        </div>

        <div id="chat"></div>

        <div id="emojiBar" class="emoji-bar"></div>

        <div id="generatePanel" class="generate-panel hidden">
          <div id="generateTitle">Generate from emoji</div>
          <input
            id="generatePromptInput"
            type="text"
            placeholder="Prompt anything"
          />
          <div class="generate-actions">
            <button id="generateEmojiBtn">Generate</button>
            <button id="cancelGenerateBtn">Cancel</button>
          </div>
        </div>
      </section>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://js.puter.com/v2/"></script>
    <script src="script.js"></script>
  </body>
</html>
